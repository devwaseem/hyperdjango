<form
  x-data="{ text: '{{ editable_text|escapejs }}' }"
  x-on:submit.prevent="$action('save_text', { text }, { method: 'POST' })"
>
  <label>
    Text
    <input type="text" x-model="text" style="width: 24rem;" />
  </label>
  <button type="submit">Save</button>
  <button type="button" x-on:click="$action('show_text', {})">
    Cancel
  </button>
</form>
