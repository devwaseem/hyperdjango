<article
  style="
    border: 1px solid #ddd;
    border-radius: 0.75rem;
    padding: 0.9rem 1rem;
    background: #fafafa;
    view-transition-name: tip-card;
  "
>
  <p style="margin: 0 0 0.35rem 0; font-size: 0.85rem; opacity: 0.7;">Tip {{ tip_index|add:1 }}</p>
  <p style="margin: 0;">{{ tip_text }}</p>
</article>
