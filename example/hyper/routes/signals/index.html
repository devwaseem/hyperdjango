{% extends "layouts/base/index.html" %}
{% block page %}
    <section x-data="{ count: 0 }" x-init="$hyper.count = {{ global_count }}">
        <h1>Signals: local and global</h1>
        <p>This page demonstrates signal key behavior:</p>
        <ul>
            <li><code>count</code> patches local <code>x-data</code>.</li>
            <li><code>$count</code> patches global <code>$hyper.count</code>.</li>
        </ul>

        <p>
            <button type="button" x-on:click="$action('increment_both', { current: count })">Increment local + global</button>
            <button type="button" x-on:click="$action('reset_global', {})">Reset global</button>
        </p>

        <p>Local count: <strong x-text="count"></strong></p>
        <p>Global count: <strong x-text="$hyper.count"></strong></p>
    </section>
{% endblock page %}
