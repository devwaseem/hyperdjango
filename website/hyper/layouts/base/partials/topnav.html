<nav x-data="{ open: false }" class="z-50 fixed top-0 inset-x-0 border-b border-black/5 bg-white/80 backdrop-blur-sm">
    <div class="mx-auto flex max-w-7xl flex-row items-center justify-between px-4 py-3 sm:px-6 sm:py-6">
        <a href="/" class="font-black font-doto text-lg leading-none sm:text-xl">HyperDjango</a>
        
        <!-- Desktop Nav -->
        <div class="hidden sm:flex flex-row items-center gap-0 font-medium font-mono text-sm">
            <a href="/#examples-section" class="px-3 py-1 tui-hover transition-none">EXAMPLES</a>
            <a href="/docs" class="px-3 py-1 {% if request.path|slice:':6' == '/docs/' or request.path == '/docs' %}bg-black text-white{% else %}tui-hover transition-none{% endif %}">DOCS</a>
            <a href="{{ github_repo_url }}" target="_blank" rel="noreferrer" class="px-3 py-1 tui-hover transition-none group flex items-center gap-2">
                <span>STAR ON GITHUB</span>
                <span class="text-[10px] border border-current px-1 group-hover:border-white">{{ github_stars_label }}</span>
            </a>
        </div>

        <!-- Mobile Burger Button -->
        <button type="button" @click="open = !open" class="sm:hidden p-2 border border-black hover:bg-black hover:text-white transition-colors" aria-label="Toggle menu">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><title>Menu</title><path stroke-linecap="square" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path></svg>
        </button>
    </div>

    <!-- Mobile Menu Overlay -->
    <div x-show="open" 
         x-cloak
         class="sm:hidden border-t border-black bg-white p-6 flex flex-col gap-6 font-mono text-xl font-bold uppercase"
         @click.away="open = false">
        <a href="/#examples-section" class="tui-hover">EXAMPLES</a>
        <a href="/docs" class="tui-hover">DOCS</a>
        <a href="{{ github_repo_url }}" target="_blank" rel="noreferrer" class="tui-hover">GITHUB</a>
    </div>
</nav>
