{% extends "hyperdjango/base.html" %}
{% block head %}
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{{ title|default:"HyperDjango" }}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Doto:wght@100..900&family=IBM+Plex+Mono:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;1,100;1,200;1,300;1,400;1,500;1,600;1,700&display=swap"
          rel="stylesheet">
    <style>
        [x-cloak] {
            display: none !important;
        }
    </style>
{% endblock head %}
{% block body %}
    <main id="app">
        {% block main %}
        {% endblock main %}
    </main>
    <ol id="sonner-toast-container"
        position="bottom-right"
        max-toasts="4"
        duration="3000"
        rich-colors="true"
        close-button="true"
        theme="light">
    </ol>
{% endblock body %}
