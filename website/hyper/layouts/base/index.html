{% extends "hyperdjango/base.html" %}
{% load static %}
{% block head %}
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{{ title|default:"HyperDjango" }}</title>
    <meta name="description" content="{{ meta_description|default:'Server-driven interactivity for Django developers.' }}" />
    <meta name="robots" content="{{ meta_robots|default:'index,follow' }}" />
    <link rel="canonical" href="{{ canonical_url }}" />
    <link rel="icon" href="{% static 'brand/favicon.svg' %}" type="image/svg+xml" />
    <link rel="mask-icon" href="{% static 'brand/favicon.svg' %}" color="#111111" />
    <meta property="og:site_name" content="{{ site_name|default:'HyperDjango' }}" />
    <meta property="og:title" content="{{ title|default:'HyperDjango' }}" />
    <meta property="og:description" content="{{ meta_description|default:'Server-driven interactivity for Django developers.' }}" />
    <meta property="og:url" content="{{ canonical_url }}" />
    <meta property="og:type" content="website" />
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="{{ title|default:'HyperDjango' }}" />
    <meta name="twitter:description" content="{{ meta_description|default:'Server-driven interactivity for Django developers.' }}" />
    <meta property="og:image" content="{% static 'brand/social-preview.svg' %}" />
    <meta name="twitter:image" content="{% static 'brand/social-preview.svg' %}" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Doto:wght@100..900&family=IBM+Plex+Mono:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;1,100;1,200;1,300;1,400;1,500;1,600;1,700&display=swap"
          rel="stylesheet">
    {% if json_ld %}
        <script type="application/ld+json">{{ json_ld|safe }}</script>
    {% endif %}
    <style>
        [x-cloak] {
            display: none !important;
        }
    </style>
{% endblock head %}
{% block body %}
    <main id="app">
        {% block main %}
        {% endblock main %}
    </main>
    <ol id="sonner-toast-container"
        position="bottom-right"
        max-toasts="4"
        duration="3000"
        rich-colors="true"
        close-button="true"
        theme="light">
    </ol>
{% endblock body %}
